<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare VLC Fetcher</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #eaeaea;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container { width: 100%; max-width: 850px; text-align: center; }
        input[type="text"] {
            width: 80%; padding: 12px; border: 2px solid #f6821f; border-radius: 4px;
            background: #2b2b2b; color: #fff; margin-bottom: 20px;
        }
        button {
            padding: 12px 24px; background-color: #f6821f; border: none;
            color: white; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        video { width: 100%; border-radius: 6px; background: #000; margin-top: 20px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Cloudflare Edge Player</h2>
    <input type="text" id="rawUrl" placeholder="Paste .m3u8 URL here...">
    <button onclick="launchStream()">Stream Live</button>
    <div id="streamStatus" style="margin-top: 10px; color: #aaa;">Status: Idle</div>
    
    <video id="vlcPreview" controls autoplay></video>
</div>

<script>
    const video = document.getElementById('vlcPreview');
    const statusText = document.getElementById('streamStatus');
    let hlsInstance = null;

    function launchStream() {
        const rawUrl = document.getElementById('rawUrl').value.trim();
        if (!rawUrl) return;

        // Points directly to your Cloudflare Function backend!
        const proxiedStreamUrl = `/proxy?url=${encodeURIComponent(rawUrl)}`;
        
        statusText.innerText = "Connecting via Cloudflare Edge...";

        if (Hls.isSupported()) {
            if (hlsInstance) hlsInstance.destroy();
            
            hlsInstance = new Hls();
            hlsInstance.loadSource(proxiedStreamUrl);
            hlsInstance.attachMedia(video);
            
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                statusText.innerText = "Status: Live!";
                video.play().catch(e => console.log(e));
            });
            hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                if(data.fatal) statusText.innerText = "Error: Stream blocked or invalid.";
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxiedStreamUrl;
        }
    }
</script>
</body>
</html>
